<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS S3 Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #232526, #414345);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 80%;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #00c6ff;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #00c6ff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s ease;
            font-weight: bold;
        }

        .btn:hover {
            background: #0072ff;
        }

        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My AWS S3 Project</h1>
        <p>
            This static website is hosted on Amazon S3 Bucket.
            The project demonstrates cloud deployment, hosting,
            and scalability using AWS services.
        </p>

        <a href="#" class="btn">Explore Project</a>

        <footer>
            © 2026 Aditya Raj Ahuja | Hosted on AWS S3
        </footer>
    </div>
</body>
</html>
